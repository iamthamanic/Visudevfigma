<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand">
        <p class="eyebrow" data-i18n="eyebrow">Projektgedächtnis</p>
        <h1 id="project-title">Project Memory</h1>
        <p id="project-summary" class="lede"></p>
      </div>
      <div class="controls">
        <label class="lang">
          <span data-i18n="lang">Sprache</span>
          <select id="lang-select" aria-label="Language">
            <option value="de">DE</option>
            <option value="en">EN</option>
          </select>
        </label>
        <nav class="tabs" role="tablist">
          <button type="button" class="tab is-active" data-view="status" role="tab">Status</button>
          <button type="button" class="tab" data-view="features" role="tab">Features</button>
          <button type="button" class="tab" data-view="changes" role="tab">Changes</button>
          <button type="button" class="tab" data-view="decisions" role="tab">Decisions</button>
        </nav>
      </div>
    </header>

    <main>
      <section id="view-status" class="view is-active"></section>
      <section id="view-features" class="view" hidden></section>
      <section id="view-changes" class="view" hidden></section>
      <section id="view-decisions" class="view" hidden></section>
    </main>

    <footer class="foot">
      <p>memory-live-doc · data from <code>./data/*.json</code></p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
