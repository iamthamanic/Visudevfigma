name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI-only placeholder JWT (format-valid). E2E mocks Supabase; not a deploy secret.
env:
  VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjIwOTAxMjUyODV9.e2e-ci-placeholder-signature
  # E2E tests mock Supabase edge functions; default app mode is local-first since Phase 1.
  VITE_VISUDEV_MODE: supabase

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build
        env:
          VITE_BLUEPRINT_DEMO_ENRICHMENT: "true"
          VITE_ACCESS_CONTROL_V2: "true"

      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
